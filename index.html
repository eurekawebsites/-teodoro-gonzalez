<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teodoro González — Arrendador y Constructor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    a { color: inherit; text-decoration: none; }

    :root {
      --stone:     #8B2525;
      --stone-dk:  #2E3F5C;
      --sand:      #D8DCE4;
      --sand-lt:   #F0F2F6;
      --brick:     #8B2525;
      --brick-dk:  #6E1B1B;
      --off-white: #F7F8FA;
      --dark:      #1A2638;
    }

    body {
      background: #C8CDD8;
      min-height: 100vh;
      padding: 28px 16px 36px;
      font-family: 'Inter', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
      border-radius: 2px;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(44,31,14,0.22), 0 2px 6px rgba(44,31,14,0.12);
    }

    /* ── Hero top ── */
    .card-hero {
      background: var(--stone-dk);
      padding: 36px 28px 28px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* Diagonal stripe texture overlay */
    .card-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        135deg,
        transparent,
        transparent 6px,
        rgba(255,255,255,0.025) 6px,
        rgba(255,255,255,0.025) 12px
      );
      pointer-events: none;
    }

    /* Gold top accent bar */
    .card-hero::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--stone) 0%, #C04040 50%, var(--stone) 100%);
    }

    .hero-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      position: relative;
      z-index: 1;
    }

    .card-name {
      font-family: 'Raleway', sans-serif;
      font-weight: 800;
      font-size: clamp(1.7rem, 6.5vw, 2.1rem);
      color: var(--off-white);
      line-height: 1.1;
      margin-bottom: 8px;
      position: relative;
      z-index: 1;
    }

    /* Gold divider line under name */
    .name-divider {
      width: 50px;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
      margin: 10px auto 12px;
    }

    .card-role {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 0.72rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #D4AF6A;
      position: relative;
      z-index: 1;
    }

    /* ── Tag strip ── */
    .card-strip {
      background: var(--brick);
      padding: 11px 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 3px;
      align-items: center;
    }

    .strip-text {
      font-family: 'Inter', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--off-white);
      opacity: 0.9;
      text-align: center;
    }

    /* ── Body section ── */
    .card-body {
      background: var(--off-white);
      padding: 22px 24px 26px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── Contact rows ── */
    .contact-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 16px;
      border-radius: 2px;
      background: var(--sand-lt);
      border: 1px solid var(--sand);
      cursor: pointer;
      width: 100%;
      text-align: left;
      transition: background 0.15s ease, transform 0.1s ease;
      font-family: 'Inter', sans-serif;
      color: var(--dark);
    }

    .contact-btn:hover {
      background: var(--sand);
      transform: translateY(-1px);
    }
    .contact-btn:active { transform: translateY(0); }

    .contact-btn-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .contact-btn-label {
      display: flex;
      flex-direction: column;
      gap: 1px;
      flex: 1;
      min-width: 0;
    }

    .contact-btn-type {
      font-size: 0.58rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--stone);
      font-weight: 500;
    }

    .contact-btn-value {
      font-size: 0.92rem;
      font-weight: 500;
      color: var(--dark);
    }

    /* ── Save button ── */
    .btn-save {
      background: var(--stone-dk);
      border-color: var(--stone-dk);
      color: var(--off-white);
      justify-content: center;
      gap: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 600;
      font-size: 0.75rem;
      padding: 14px 16px;
    }

    .btn-save:hover {
      background: var(--brick);
      border-color: var(--brick);
    }

    /* ── Footer ── */
    .card-footer {
      background: var(--sand);
      border-top: 1px solid #C4C8D2;
      padding: 12px 20px;
      text-align: center;
    }

    .card-footer a {
      font-size: 0.58rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--stone-dk);
      opacity: 0.55;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    .card-footer a:hover { opacity: 0.9; }
  </style>
</head>
<body>

  <div class="card">

    <!-- HERO -->
    <div class="card-hero">

      <!-- House icon SVG -->
      <svg class="hero-icon" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <!-- House body -->
        <rect x="12" y="42" width="56" height="34" rx="1" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.55)" stroke-width="2"/>
        <!-- Roof -->
        <polyline points="6,44 40,10 74,44" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="2.5" stroke-linejoin="round"/>
        <!-- Door -->
        <rect x="32" y="57" width="16" height="19" rx="1" fill="none" stroke="#C04040" stroke-width="2"/>
        <circle cx="45" cy="67" r="1.5" fill="#C04040"/>
        <!-- Left window -->
        <rect x="16" y="50" width="12" height="9" rx="1" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
        <line x1="22" y1="50" x2="22" y2="59" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
        <line x1="16" y1="54.5" x2="28" y2="54.5" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
        <!-- Right window -->
        <rect x="52" y="50" width="12" height="9" rx="1" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
        <line x1="58" y1="50" x2="58" y2="59" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
        <line x1="52" y1="54.5" x2="64" y2="54.5" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
        <!-- Chimney -->
        <rect x="54" y="16" width="7" height="16" rx="1" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.8"/>
      </svg>

      <h1 class="card-name">Teodoro<br>González</h1>
      <div class="name-divider"></div>

    </div>

    <!-- STRIP -->
    <div class="card-strip">
      <p class="strip-text">Arrendador &amp; Constructor</p>
      <p class="strip-text" style="opacity:0.75;letter-spacing:1.5px;">Renta · Construcción de Casas</p>
    </div>

    <!-- BODY -->
    <div class="card-body">

      <a class="contact-btn"
         href="https://wa.me/525622125872"
         target="_blank" rel="noopener noreferrer">
        <svg class="contact-btn-icon" viewBox="0 0 24 24" fill="#2E3F5C" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
        <span class="contact-btn-label">
          <span class="contact-btn-type">WhatsApp</span>
          <span class="contact-btn-value">+52 56 2212 5872</span>
        </span>
      </a>

      <button class="contact-btn btn-save" onclick="saveContact()" type="button">
        <svg class="contact-btn-icon" viewBox="0 0 24 24" fill="none" stroke="#FAF7F2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
          <path d="M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/>
          <polyline points="7 3 7 8 15 8"/>
        </svg>
        Guardar contacto
      </button>

    </div>

    <!-- FOOTER -->
    <div class="card-footer">
      <a href="https://www.eurekawebsites.tech/" target="_blank" rel="noopener noreferrer">Powered by Eureka Websites</a>
    </div>

  </div>

  <script>
    function saveContact() {
      var vcard = [
        'BEGIN:VCARD',
        'VERSION:3.0',
        'FN:Teodoro González',
        'N:González;Teodoro;;;',
        'TITLE:Arrendador y Constructor',
        'TEL;TYPE=CELL,VOICE:+525622125872',
        'END:VCARD'
      ].join('\r\n');

      var blob = new Blob([vcard], { type: 'text/vcard' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'Teodoro-Gonzalez.vcf';
      a.click();
      URL.revokeObjectURL(url);
    }
  </script>

</body>
</html>
