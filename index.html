<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teodoro González — Arrendador y Constructor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    a { color: inherit; text-decoration: none; }

    :root {
      --red:   #A82A20;
      --navy:  #2C3A4A;
      --white: #FFFFFF;
    }

    body {
      background: radial-gradient(ellipse at 50% 30%, #fce8e8 0%, #f0e4e4 70%);
      min-height: 100vh;
      padding: 28px 16px 36px;
      font-family: 'Poppins', sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .card {
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(168,42,32,0.2);
      box-shadow: 0 4px 40px rgba(168,42,32,0.15), 0 8px 32px rgba(0,0,0,0.12);
    }

    /* ── Hero ── */
    .card-hero {
      background: #ffffff;
      padding: 32px 28px 28px;
      text-align: center;
      border-bottom: 1px solid rgba(168,42,32,0.15);
    }

    .hero-logo {
      width: 110px;
      height: 110px;
      border-radius: 8px;
      background: #f5f0ea;
      border: 1px solid rgba(168,42,32,0.15);
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      margin: 0 auto 18px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-logo img {
      width: 86px;
      height: 86px;
      object-fit: contain;
    }

    .card-name {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: clamp(1.5rem, 6vw, 1.9rem);
      color: var(--navy);
      line-height: 1.15;
      margin-bottom: 10px;
      white-space: nowrap;
    }

    .card-role {
      display: inline-block;
      background: var(--red);
      color: var(--white);
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 0.65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 2px;
    }

    /* ── Contact body ── */
    .card-body {
      background: #2e3347;
      padding: 20px 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .contact-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 16px;
      border-radius: 6px;
      font-family: 'Poppins', sans-serif;
      background: #3a4158;
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--white);
      cursor: pointer;
      width: 100%;
      text-align: left;
      transition: opacity 0.18s ease, transform 0.1s ease;
    }

    .contact-btn:hover { opacity: 0.8; transform: translateY(-1px); }
    .contact-btn:active { transform: translateY(0); }

    .contact-btn-icon {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    .contact-btn-label {
      display: flex;
      flex-direction: column;
      gap: 1px;
      flex: 1;
      min-width: 0;
    }

    .contact-btn-type {
      font-size: 0.6rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(201,122,16,0.9);
      font-weight: 600;
    }

    .contact-btn-value {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--white);
    }

    /* Save button */
    .btn-save {
      background: var(--red);
      border-color: var(--red);
      color: var(--white);
      justify-content: center;
      gap: 10px;
      font-weight: 700;
      font-size: 0.78rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 14px 16px;
    }

    .btn-save:hover { opacity: 0.85; }
  </style>
</head>
<body>

  <div class="card">

    <!-- HERO -->
    <div class="card-hero">
      <div class="hero-logo">
        <img src="house3.png" alt="Casa icono">
      </div>
      <h1 class="card-name">Teodoro González</h1>
      <p class="card-role">Arrendador &amp; Constructor</p>
    </div>

    <!-- BODY -->
    <div class="card-body">

      <a class="contact-btn"
         href="https://wa.me/525622125872"
         target="_blank" rel="noopener noreferrer">
        <svg class="contact-btn-icon" viewBox="0 0 24 24" fill="#A82A20" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
        <span class="contact-btn-label">
          <span class="contact-btn-type">WhatsApp</span>
          <span class="contact-btn-value">+52 56 2212 5872</span>
        </span>
      </a>

      <a class="contact-btn"
         href="mailto:lutego44@gmail.com">
        <svg class="contact-btn-icon" viewBox="0 0 24 24" fill="none" stroke="#A82A20" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <polyline points="2,4 12,13 22,4"/>
        </svg>
        <span class="contact-btn-label">
          <span class="contact-btn-type">Correo</span>
          <span class="contact-btn-value">lutego44@gmail.com</span>
        </span>
      </a>

      <button class="contact-btn" onclick="copyClabe(this)" type="button" style="width:100%;text-align:left">
        <svg class="contact-btn-icon" viewBox="0 0 24 24" fill="none" stroke="#A82A20" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="5" width="20" height="14" rx="2"/>
          <line x1="2" y1="10" x2="22" y2="10"/>
        </svg>
        <span class="contact-btn-label">
          <span class="contact-btn-type">CLABE · HSBC</span>
          <span class="contact-btn-value" id="clabe-val">021180040549679220</span>
        </span>
      </button>

      <button class="contact-btn btn-save" onclick="saveContact()" type="button">
        <svg class="contact-btn-icon" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
          <path d="M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/>
          <polyline points="7 3 7 8 15 8"/>
        </svg>
        Guardar contacto
      </button>

    </div>

  </div>

  <footer style="text-align:center;padding:20px 0 12px">
    <a href="https://www.eurekawebsites.tech/" target="_blank" rel="noopener noreferrer"
       style="display:inline-flex;align-items:center;font-size:0.62rem;letter-spacing:1.5px;text-transform:uppercase;color:rgba(44,58,74,0.45);text-decoration:none;transition:color 0.2s;"
       onmouseover="this.style.color='rgba(44,58,74,0.75)'"
       onmouseout="this.style.color='rgba(44,58,74,0.45)'">
      <span style="display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:radial-gradient(circle,#fde8e4 0%,#f8cfc9 60%,#f0b8b0 100%);border:1px solid rgba(240,96,100,0.4);margin-right:7px;flex-shrink:0;">
        <img src="https://raw.githubusercontent.com/eurekawebsites/eureka-website/main/eureka-bird-1.svg" alt="" style="width:13px;height:13px;display:block;" />
      </span>
      Powered by Eureka Websites
    </a>
  </footer>

  <script>
    function copyClabe(btn) {
      navigator.clipboard.writeText('021180040549679220').then(function() {
        var el = document.getElementById('clabe-val');
        var orig = el.textContent;
        el.textContent = '¡Copiado!';
        setTimeout(function() { el.textContent = orig; }, 2000);
      }).catch(function() {
        var range = document.createRange();
        range.selectNode(document.getElementById('clabe-val'));
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
      });
    }

    function saveContact() {
      var vcard = [
        'BEGIN:VCARD',
        'VERSION:3.0',
        'FN:Teodoro González',
        'N:González;Teodoro;;;',
        'TITLE:Arrendador y Constructor',
        'TEL;TYPE=CELL,VOICE:+525622125872',
        'END:VCARD'
      ].join('\r\n');

      var blob = new Blob([vcard], { type: 'text/vcard' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'Teodoro-Gonzalez.vcf';
      a.click();
      URL.revokeObjectURL(url);
    }
  </script>

</body>
</html>
